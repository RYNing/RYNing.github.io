# Site
locale                   : "en-US"
title                    : "Ruining Yang"
title_separator          : "-"
name                     : &name "Ruining Yang"
description              : &description "Personal homepage of Ruining Yang (杨蕊宁), PhD Candidate at Northeastern University."
url                      : https://ryning.github.io
baseurl                  : ""
repository               : "RYNing/RYNing.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Theme skin
skin                     : "default"

# Search (on by default in AcademicPages)
search                   : false

# Build settings
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
  - /example

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false

# Outputting
permalink: /:categories/:title/
timezone: America/New_York

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
  - jekyll-include-cache

author:
  name             : "Ruining Yang (杨蕊宁)"
  avatar           : "profile.svg"
  bio              : "PhD Candidate, Northeastern University"
  location         : "Boston, MA"
  employer         : "Northeastern University"
  pubmed           :
  googlescholar    : "https://scholar.google.com/citations?user=qDBpexUAAAAJ&hl=en&oi=ao"
  email            : "yang.ruini@northeastern.edu"
  researchgate     :
  github           : "RYNing"
  linkedin         :
  twitter          :
  impactstory      :
  orcid            :
  wikipedia        :
